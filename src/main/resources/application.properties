spring.application.name=bowmenn-api

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bowmenn}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=${JWT_SECRET:b3dtZW5uLWp3dC1zZWNyZXQta2V5LWZvci1wcm9kdWN0aW9uLXVzZS1taW5pbXVtLTI1Ni1iaXRz}
jwt.expiration=${JWT_EXPIRATION:86400000}

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ImageKit (server-side upload). Override the keys via env vars in production.
imagekit.url-endpoint=${IMAGEKIT_URL_ENDPOINT:https://ik.imagekit.io/kbvcwovny}
imagekit.public-key=${IMAGEKIT_PUBLIC_KEY:public_+lN1b4+GSmfHh5TacXLFsFXot/s=}
imagekit.private-key=${IMAGEKIT_PRIVATE_KEY:private_rkCBJKgfkYxo1gP9BXwMAOb86vM=}
imagekit.upload-url=${IMAGEKIT_UPLOAD_URL:https://upload.imagekit.io/api/v1/files/upload}
imagekit.folder=${IMAGEKIT_FOLDER:/bowmenn/pod}

# Server
server.port=${PORT:8080}

# SpringDoc
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
