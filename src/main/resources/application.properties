spring.application.name=bowmenn-api

# Local overrides (gitignored) - for development secrets
spring.config.import=optional:file:./bowmenn-local.properties

# ===================== DATABASE =====================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===================== JWT =====================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===================== FILE UPLOAD =====================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Storage Provider: "local" or "imagekit"
storage.provider=${STORAGE_PROVIDER:local}
storage.local.directory=${UPLOAD_DIR:uploads}

# ===================== IMAGEKIT =====================
imagekit.url-endpoint=${IMAGEKIT_URL_ENDPOINT:}
imagekit.public-key=${IMAGEKIT_PUBLIC_KEY:}
imagekit.private-key=${IMAGEKIT_PRIVATE_KEY:}
imagekit.upload-url=${IMAGEKIT_UPLOAD_URL:https://upload.imagekit.io/api/v1/files/upload}
imagekit.folder=${IMAGEKIT_FOLDER:/bowmenn/pod}

# ===================== SERVER =====================
server.port=${PORT:8080}

# SpringDoc / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html